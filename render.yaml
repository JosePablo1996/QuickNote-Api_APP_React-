services:
  - type: web
    name: quicknote-api
    runtime: python
    plan: free
    region: oregon  # o la región más cercana a ti
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false  # Se configurará manualmente en Render
      - key: SUPABASE_KEY
        sync: false  # Se configurará manualmente en Render
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0