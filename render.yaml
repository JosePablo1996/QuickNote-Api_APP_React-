services:
  # Servicio web para la API FastAPI
  - type: web
    name: quicknote-api
    runtime: python
    repo: https://github.com/JosePablo1996/QuickNote-Api_APP_React-
    branch: master  # Importante: usa 'master' si esa es tu rama principal
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false  # La configuraremos manualmente
      - key: SUPABASE_KEY
        sync: false  # La configuraremos manualmente
      - key: ENVIRONMENT
        value: production